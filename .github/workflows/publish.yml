name: Publish to GitHub Packages

on:
  push:
    branches: [main]

jobs:
  publish:
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        run: npm install

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: version
        run: |
          NEW_VERSION=$(npm version patch --no-git-tag-version)
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and tag version bump
        run: |
          git add package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git tag ${{ steps.version.outputs.version }}
          git push --follow-tags

      - name: Bundle with esbuild
        run: npm run build

      - name: Build standalone binaries
        run: |
          npx pkg dist/setup.cjs \
            --targets node20-macos-x64,node20-macos-arm64,node20-win-x64,node20-linux-x64 \
            --output dist/claude-bedrock-setup \
            --compress GZip

      - name: Create GitHub release with binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/claude-bedrock-setup-macos
            dist/claude-bedrock-setup-macos-arm64
            dist/claude-bedrock-setup-win.exe
            dist/claude-bedrock-setup-linux

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
